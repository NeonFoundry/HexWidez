<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HEXWIDE cyberpunk logo">
  <defs>
    <linearGradient id="neonText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#ff2bd6"/>
      <stop offset="100%" stop-color="#faff00"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#00f5ff" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="260" fill="#08000f"/>
  <rect width="900" height="260" fill="url(#grid)"/>

  <!-- neon frame -->
  <path d="M35 40 H780 L850 110 V220 H120 L35 145 Z"
        fill="none"
        stroke="#00f5ff"
        stroke-width="4"
        filter="url(#glow)"/>

  <path d="M60 65 H760 L825 125"
        fill="none"
        stroke="#ff2bd6"
        stroke-width="2"
        stroke-dasharray="14 10"
        filter="url(#glow)"/>

  <!-- circuit traces -->
  <g fill="none" stroke="#faff00" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <path d="M90 198 H180 V170 H230"/>
    <path d="M690 70 H745 V100 H795"/>
    <path d="M650 205 H720 V178 H790"/>
    <circle cx="230" cy="170" r="5" fill="#faff00"/>
    <circle cx="795" cy="100" r="5" fill="#faff00"/>
    <circle cx="790" cy="178" r="5" fill="#faff00"/>
  </g>

  <!-- logo text shadow -->
  <text x="450" y="155"
        text-anchor="middle"
        font-family="Orbitron, Rajdhani, 'Segoe UI', Arial, sans-serif"
        font-size="92"
        font-weight="900"
        letter-spacing="8"
        fill="#ff2bd6"
        opacity="0.45"
        transform="translate(6 6)"
        filter="url(#glow)">
    HEXWIDE
  </text>

  <!-- main logo text -->
  <text x="450" y="155"
        text-anchor="middle"
        font-family="Orbitron, Rajdhani, 'Segoe UI', Arial, sans-serif"
        font-size="92"
        font-weight="900"
        letter-spacing="8"
        fill="url(#neonText)"
        stroke="#ffffff"
        stroke-width="1.2"
        filter="url(#glow)">
    HEXWIDE
  </text>

  <!-- glitch slices -->
  <text x="452" y="112"
        text-anchor="middle"
        font-family="Orbitron, Rajdhani, 'Segoe UI', Arial, sans-serif"
        font-size="92"
        font-weight="900"
        letter-spacing="8"
        fill="#00f5ff"
        opacity="0.45">
    HEXWIDE
  </text>

  <rect x="0" y="0" width="900" height="260" fill="none" stroke="#ff2bd6" stroke-width="2"/>
</svg>